<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ByteLock Recovery</title>
<style>
  body { font-family: -apple-system, Segoe UI, Arial, sans-serif; background:#f4f6f9; margin:0; padding:24px; color:#1c2430; }
  .card { background:#fff; border-radius:8px; padding:24px; max-width:420px; margin:0 auto; box-shadow:0 1px 4px rgba(0,0,0,0.08); }
  h1 { font-size:16px; font-weight:600; margin:0 0 12px; color:#1c2430; }
  p { font-size:13px; line-height:1.5; color:#4a5568; margin:0 0 16px; }
  .status { display:flex; align-items:center; gap:10px; padding:14px; border-radius:6px; background:#eef3fe; font-size:13px; }
  .status.success { background:#e7f7ee; color:#1c7a3d; }
  .status.error { background:#fdeceb; color:#c0392b; }
  .spinner { width:16px; height:16px; border:2px solid #2f6fed; border-top-color:transparent; border-radius:50%; animation:spin 0.8s linear infinite; flex-shrink:0; }
  .status.success .spinner, .status.error .spinner { display:none; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <h1>ByteLock Folder Recovery</h1>
  <p>Confirming your identity to recover access to your folder.</p>
  <div class="status" id="status"><div class="spinner"></div><span id="statusText">Verifying this device...</span></div>
</div>
<script src="/nacl.min.js"></script>
<script>
function toBase64(bytes) {
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

function fromBase64(str) {
  const bin = atob(str);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

function setStatus(text, cls) {
  const el = document.getElementById('status');
  el.className = 'status' + (cls ? ' ' + cls : '');
  document.getElementById('statusText').textContent = text;
}

function openDb() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('bytelock', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('keys');
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function loadKey(db) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('keys', 'readonly');
    const req = tx.objectStore('keys').get('signingSecretKey');
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function main() {
  try {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    if (!token) { setStatus('Missing recovery challenge.', 'error'); return; }

    const db = await openDb();
    const secretKeyB64 = await loadKey(db);
    if (!secretKeyB64) {
      setStatus('This phone is not paired with ByteLock.', 'error');
      return;
    }

    const secretKey = fromBase64(secretKeyB64);
    const message = new TextEncoder().encode(token);
    const signature = nacl.sign.detached(message, secretKey);

    setStatus('Confirming with your computer...');

    const resp = await fetch('/recover/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, signature: toBase64(signature) })
    });
    const data = await resp.json();

    if (data.ok) {
      setStatus('Identity confirmed. You can close this page.', 'success');
    } else {
      setStatus('Recovery failed \u2014 challenge expired or invalid.', 'error');
    }
  } catch (e) {
    setStatus('Something went wrong: ' + e.message, 'error');
  }
}
main();
</script>
</body>
</html>
